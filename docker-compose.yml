services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - seckill-net

  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - seckill-net

  user-service:
    build: ./seckill-user
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=truedocker-compose logs user-service-2docker-compose logs user-service-2docker-compose logs user-service-2docker-compose logs user-service-2docker-compose logs user-service-2docker-compose logs user-service-2
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    networks:
      - seckill-net

  user-service-2:
    build: ./seckill-user
    container_name: user-service-2
    ports:
      - "8082:8081"   # 宿主机 8082 -> 容器 8081
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    networks:
      - seckill-net

  nginx:
    image: nginx:1.24
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./static:/usr/share/nginx/html
    depends_on:
      - user-service
    networks:
      - seckill-net

networks:
  seckill-net:
    driver: bridge

volumes:
  mysql-data: