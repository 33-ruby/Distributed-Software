services:
  mysql-master:
    image: mysql:8.0
    platform: linux/amd64
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: seckill_db
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/master/data:/var/lib/mysql
      - ./mysql/master/conf/master.cnf:/etc/mysql/conf.d/master.cnf
    networks:
      - seckill-net

  mysql-slave:
    image: mysql:8.0
    platform: linux/amd64
    container_name: mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: seckill_db
    ports:
      - "3308:3306"
    volumes:
      - ./mysql/slave/data:/var/lib/mysql
      - ./mysql/slave/conf/slave.cnf:/etc/mysql/conf.d/slave.cnf
    depends_on:
      - mysql-master
    networks:
      - seckill-net

  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - seckill-net

  user-service:
    build: ./seckill-user
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql-master
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-master:3306/seckill_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    networks:
      - seckill-net

  user-service-2:
    build: ./seckill-user
    container_name: user-service-2
    ports:
      - "8082:8081"
    depends_on:
      - mysql-master
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-master:3306/seckill_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    networks:
      - seckill-net

  product-service:
    build:
      context: .
      dockerfile: Dockerfile.product
    container_name: product-service
    ports:
      - "8083:8083"
    depends_on:
      - mysql-master
      - mysql-slave
      - redis
    environment:
      - JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8
      # 主库（写）
      - SPRING_DATASOURCE_MASTER_URL=jdbc:mysql://mysql-master:3306/seckill_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_MASTER_USERNAME=root
      - SPRING_DATASOURCE_MASTER_PASSWORD=root123
      # 从库（读）
      - SPRING_DATASOURCE_SLAVE_URL=jdbc:mysql://mysql-slave:3306/seckill_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_SLAVE_USERNAME=root
      - SPRING_DATASOURCE_SLAVE_PASSWORD=root123
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    networks:
      - seckill-net

  nginx:
    image: nginx:1.24
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./static:/usr/share/nginx/html
    depends_on:
      - user-service
    networks:
      - seckill-net

networks:
  seckill-net:
    driver: bridge