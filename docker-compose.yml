version: '3.8'

services:
  # --- 数据库层：MySQL 主从 ---
  mysql-master:
    image: mysql:8.0
    platform: linux/amd64
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: seckill_db
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/master/data:/var/lib/mysql
      - ./mysql/master/conf/master.cnf:/etc/mysql/conf.d/master.cnf
    networks:
      - seckill-net

  mysql-slave:
    image: mysql:8.0
    platform: linux/amd64
    container_name: mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: seckill_db
    ports:
      - "3308:3306"
    volumes:
      - ./mysql/slave/data:/var/lib/mysql
      - ./mysql/slave/conf/slave.cnf:/etc/mysql/conf.d/slave.cnf
    depends_on:
      - mysql-master
    networks:
      - seckill-net

  # --- 缓存层：Redis ---
  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes # 开启持久化
    networks:
      - seckill-net

  # --- 消息队列：Zookeeper + Kafka ---
  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - seckill-net

  kafka:
    image: wurstmeister/kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://127.0.0.1:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
    depends_on:
      - zookeeper
    networks:
      - seckill-net

  # --- 微服务层：User & Product ---
  user-service:
    build: ./seckill-user
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql-master
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-master:3306/seckill_db?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root123
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    networks:
      - seckill-net

  product-service:
    build:
      context: .
      dockerfile: Dockerfile.product
    container_name: product-service
    ports:
      - "8083:8083"
    depends_on:
      - mysql-master
      - mysql-slave
      - redis
      - kafka
    environment:
      - JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8
      - SPRING_DATASOURCE_MASTER_URL=jdbc:mysql://mysql-master:3306/seckill_db?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_MASTER_USERNAME=root
      - SPRING_DATASOURCE_MASTER_PASSWORD=root123
      - SPRING_DATASOURCE_SLAVE_URL=jdbc:mysql://mysql-slave:3306/seckill_db?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_SLAVE_USERNAME=root
      - SPRING_DATASOURCE_SLAVE_PASSWORD=root123
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - seckill-net

  # --- 网关/负载均衡：Nginx ---
  nginx:
    image: nginx:1.24
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./static:/usr/share/nginx/html
    depends_on:
      - user-service
      - product-service
    networks:
      - seckill-net

networks:
  seckill-net:
    driver: bridge